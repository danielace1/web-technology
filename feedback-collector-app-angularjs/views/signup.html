<div class="min-h-[500px] flex items-center justify-center">
  <div class="w-full max-w-md">
    <!-- CARD -->
    <div class="bg-white rounded-2xl shadow-2xl p-8 border border-gray-100">
      <!-- Header -->
      <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Create Account ✨</h2>
        <p class="text-gray-500 text-sm mt-1">
          Start your journey with Response Hub
        </p>
      </div>

      <form ng-submit="signup()" class="space-y-4">
        <input
          type="text"
          ng-model="name"
          placeholder="Full Name"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500"
        />

        <input
          type="email"
          ng-model="email"
          placeholder="Email"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500"
        />

        <input
          type="password"
          ng-model="password"
          placeholder="Password"
          class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500"
        />

        <p class="text-red-500 text-sm text-center" ng-if="error">{{error}}</p>

        <button
          class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-2 rounded-lg font-medium hover:opacity-90 shadow-md"
        >
          Create Account 🚀
        </button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-4">
        Already have an account?
        <a href="#!/login" class="text-indigo-600 font-medium">Login</a>
      </p>
    </div>
  </div>
</div>
