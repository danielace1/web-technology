<div>
  <!-- 🔥 HEADER -->
  <div class="mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Fill Feedback</h2>
    <p class="text-gray-500 text-sm">We value your honest feedback</p>
  </div>

  <!-- ✅ SUCCESS STATE -->
  <div
    ng-if="success"
    class="text-center py-16 bg-green-50 border border-green-200 rounded-xl"
  >
    <div class="text-5xl mb-4">✅</div>
    <h3 class="text-xl font-semibold text-green-700">Feedback Submitted!</h3>
    <p class="text-gray-600 mt-2">Thank you for your valuable feedback 💙</p>

    <button
      ng-click="resetForm()"
      class="mt-6 bg-indigo-600 text-white px-5 py-2 rounded-lg"
    >
      Submit Another
    </button>
  </div>

  <!-- ❌ EMPTY STATE -->
  <div
    ng-if="!success && questions.length === 0"
    class="text-center text-gray-400 py-10 border border-dashed rounded-lg"
  >
    No questions available. Please ask admin to create a form.
  </div>

  <!-- ✅ FORM -->
  <form
    ng-if="!success && questions.length > 0"
    ng-submit="submitForm()"
    class="space-y-6"
  >
    <div
      ng-repeat="q in questions track by $index"
      class="bg-gray-50 border border-gray-200 rounded-xl p-5 shadow-sm"
    >
      <p class="font-medium text-gray-800 mb-3">{{$index + 1}}. {{q.text}}</p>

      <input
        ng-if="q.type=='text'"
        type="text"
        ng-model="answers[$index]"
        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400"
      />

      <select
        ng-if="q.type=='rating'"
        ng-model="answers[$index]"
        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400"
      >
        <option value="">Select rating</option>
        <option value="1">⭐ 1 - Poor</option>
        <option value="2">⭐⭐ 2 - Fair</option>
        <option value="3">⭐⭐⭐ 3 - Good</option>
        <option value="4">⭐⭐⭐⭐ 4 - Very Good</option>
        <option value="5">⭐⭐⭐⭐⭐ 5 - Excellent</option>
      </select>

      <div ng-if="q.type=='yesno'" class="flex gap-4 mt-2">
        <label class="flex items-center gap-2">
          <input type="radio" ng-model="answers[$index]" value="Yes" />
          Yes
        </label>
        <label class="flex items-center gap-2">
          <input type="radio" ng-model="answers[$index]" value="No" />
          No
        </label>
      </div>
    </div>

    <div class="text-right">
      <button
        type="submit"
        class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700"
      >
        Submit Feedback 🚀
      </button>
    </div>
  </form>
</div>
