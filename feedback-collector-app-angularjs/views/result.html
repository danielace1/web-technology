<div>
  <!-- 🔥 HEADER -->
  <div class="mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Responses Dashboard</h2>
    <p class="text-gray-500 text-sm">View and analyze collected feedback</p>
  </div>

  <!-- 📊 SUMMARY -->
  <div class="grid md:grid-cols-3 gap-4 mb-6">
    <!-- Total Responses -->
    <div class="bg-indigo-50 border border-indigo-200 rounded-xl p-4">
      <p class="text-sm text-gray-500">Total Responses</p>
      <h3 class="text-2xl font-bold text-indigo-600">{{responses.length}}</h3>
    </div>

    <!-- Placeholder for future -->
    <div class="bg-green-50 border border-green-200 rounded-xl p-4">
      <p class="text-sm text-gray-500">Status</p>
      <h3 class="text-lg font-semibold text-green-600">Active Collection</h3>
    </div>

    <!-- Placeholder -->
    <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4">
      <p class="text-sm text-gray-500">Insights</p>
      <h3 class="text-lg font-semibold text-yellow-600">Basic Analytics</h3>
    </div>
  </div>

  <!-- ❌ EMPTY STATE -->
  <div
    ng-if="responses.length === 0"
    class="text-center text-gray-400 py-10 border border-dashed rounded-lg"
  >
    No responses yet.
  </div>

  <!-- ✅ RESPONSE CARDS -->
  <div class="space-y-4">
    <div
      ng-repeat="res in responses track by $index"
      class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm hover:shadow-md transition"
    >
      <!-- Header -->
      <div class="flex justify-between items-center mb-3">
        <h3 class="font-semibold text-gray-800">Response {{$index + 1}}</h3>
        <span class="text-xs text-gray-400"> #{{$index + 1}} </span>
      </div>

      <!-- Answers -->
      <ul class="space-y-2">
        <li
          ng-repeat="ans in res track by $index"
          class="bg-gray-50 px-3 py-2 rounded-md text-gray-700 text-sm"
        >
          {{ans || 'No answer'}}
        </li>
      </ul>
    </div>
  </div>
</div>
