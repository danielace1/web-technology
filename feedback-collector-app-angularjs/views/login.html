<div class="min-h-[500px] flex items-center justify-center">
  <div class="w-full max-w-md">
    <!-- 🔥 CARD -->
    <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
      <!-- 🔥 HEADER -->
      <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Welcome Back 👋</h2>
        <p class="text-gray-500 text-sm mt-1">Login to access your dashboard</p>
      </div>

      <!-- 🔥 FORM -->
      <form ng-submit="login()" class="space-y-4">
        <!-- EMAIL -->
        <div>
          <label class="text-sm text-gray-600 mb-1 block">Email</label>
          <input
            type="email"
            ng-model="email"
            placeholder="admin@gmail.com"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
          />
        </div>

        <!-- PASSWORD -->
        <div>
          <label class="text-sm text-gray-600 mb-1 block">Password</label>
          <input
            type="password"
            ng-model="password"
            placeholder="••••••••"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 transition"
          />
        </div>

        <!-- ERROR -->
        <p class="text-red-500 text-sm text-center" ng-if="error">{{error}}</p>

        <!-- LOGIN BUTTON -->
        <button
          type="submit"
          class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-2 rounded-lg font-medium hover:opacity-90 transition shadow-md"
        >
          Login 🚀
        </button>
        <p class="text-center text-sm text-gray-500 mt-4">
          Don’t have an account?
          <a href="#!/signup" class="text-indigo-600 font-medium">Sign up</a>
        </p>
      </form>

      <!-- 🔥 FOOTER -->
      <div class="text-center mt-6 text-xs text-gray-400">
        Secure login powered by Firebase
      </div>
    </div>
  </div>
</div>
