<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Commerce Checkout Form</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f2f5f9;
        margin: 0;
        padding: 20px;
      }

      .container {
        width: 850px;
        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }

      h2 {
        text-align: center;
        color: #0d6efd;
      }

      .step {
        display: none;
      }

      .step.active {
        display: block;
      }

      input,
      select {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        margin-bottom: 15px;
        border: 2px solid #ccc;
        border-radius: 5px;
        font-size: 15px;
      }

      .error {
        color: red;
        font-size: 13px;
      }

      .valid {
        border-color: green;
      }

      .invalid {
        border-color: red;
      }

      .buttons {
        display: flex;
        justify-content: space-between;
      }

      button {
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        background: #0d6efd;
        color: white;
        font-size: 15px;
      }

      button:hover {
        opacity: 0.9;
      }

      .progress {
        display: flex;
        justify-content: space-between;
        margin-bottom: 25px;
      }

      .progress div {
        flex: 1;
        text-align: center;
        padding: 10px;
        margin: 5px;
        background: #dcdcdc;
        border-radius: 5px;
        font-weight: bold;
      }

      .progress .done {
        background: #198754;
        color: white;
      }

      .summary {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 8px;
        margin-top: 20px;
      }

      .summary h3 {
        margin-top: 0;
        color: #0d6efd;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>E-Commerce Checkout Form</h2>

      <div class="progress">
        <div id="p1" class="done">Shipping</div>
        <div id="p2">Billing</div>
        <div id="p3">Payment</div>
      </div>

      <form id="checkoutForm">
        <!-- STEP 1 -->
        <div class="step active" id="step1">
          <h3>Shipping Information</h3>

          <label>Full Name</label>
          <input type="text" id="name" />

          <div class="error" id="nameError"></div>

          <label>Country</label>
          <select id="country">
            <option value="">Select Country</option>
            <option value="india">India</option>
            <option value="usa">USA</option>
          </select>

          <div class="error" id="countryError"></div>

          <label>Postal Code</label>
          <input type="text" id="postal" />

          <div class="error" id="postalError"></div>

          <label>Phone Number</label>
          <input type="text" id="phone" />

          <div class="error" id="phoneError"></div>

          <div class="buttons">
            <button type="button" onclick="nextStep1()">Next</button>
          </div>
        </div>

        <!-- STEP 2 -->
        <div class="step" id="step2">
          <h3>Billing Details</h3>

          <label>Billing Address</label>
          <input type="text" id="address" />

          <div class="error" id="addressError"></div>

          <label>City</label>
          <input type="text" id="city" />

          <div class="error" id="cityError"></div>

          <div class="buttons">
            <button type="button" onclick="prevStep(1)">Previous</button>
            <button type="button" onclick="nextStep2()">Next</button>
          </div>
        </div>

        <!-- STEP 3 -->
        <div class="step" id="step3">
          <h3>Payment Method</h3>

          <label>Credit Card Number</label>
          <input type="text" id="card" />

          <div class="error" id="cardError"></div>

          <label>Expiry Date</label>
          <input type="month" id="expiry" />

          <div class="error" id="expiryError"></div>

          <div class="buttons">
            <button type="button" onclick="prevStep(2)">Previous</button>
            <button type="submit">Place Order</button>
          </div>
        </div>
      </form>

      <div class="summary">
        <h3>Order Summary</h3>

        <p><strong>Name:</strong> <span id="sName"></span></p>
        <p><strong>Country:</strong> <span id="sCountry"></span></p>
        <p><strong>Postal:</strong> <span id="sPostal"></span></p>
        <p><strong>Phone:</strong> <span id="sPhone"></span></p>
        <p><strong>Address:</strong> <span id="sAddress"></span></p>
        <p><strong>City:</strong> <span id="sCity"></span></p>
      </div>
    </div>

    <script>
      function showStep(step) {
        document.querySelectorAll(".step").forEach((s) => {
          s.classList.remove("active");
        });

        document.getElementById("step" + step).classList.add("active");
      }

      function updateSummary() {
        document.getElementById("sName").innerText =
          document.getElementById("name").value;

        document.getElementById("sCountry").innerText =
          document.getElementById("country").value;

        document.getElementById("sPostal").innerText =
          document.getElementById("postal").value;

        document.getElementById("sPhone").innerText =
          document.getElementById("phone").value;

        document.getElementById("sAddress").innerText =
          document.getElementById("address").value;

        document.getElementById("sCity").innerText =
          document.getElementById("city").value;
      }

      function nextStep1() {
        let valid = true;

        let name = document.getElementById("name");
        let country = document.getElementById("country");
        let postal = document.getElementById("postal");
        let phone = document.getElementById("phone");

        if (name.value.trim() == "") {
          valid = false;
          document.getElementById("nameError").innerText = "Enter name";
        } else {
          document.getElementById("nameError").innerText = "";
        }

        if (country.value == "") {
          valid = false;
          document.getElementById("countryError").innerText = "Select country";
        } else {
          document.getElementById("countryError").innerText = "";
        }

        let postalPattern;

        if (country.value == "india") {
          postalPattern = /^[0-9]{6}$/;
        } else {
          postalPattern = /^[0-9]{5}$/;
        }

        if (!postalPattern.test(postal.value)) {
          valid = false;
          document.getElementById("postalError").innerText =
            "Invalid postal code";
        } else {
          document.getElementById("postalError").innerText = "";
        }

        let phonePattern;

        if (country.value == "india") {
          phonePattern = /^[6-9][0-9]{9}$/;
        } else {
          phonePattern = /^[0-9]{10}$/;
        }

        if (!phonePattern.test(phone.value)) {
          valid = false;
          document.getElementById("phoneError").innerText =
            "Invalid phone number";
        } else {
          document.getElementById("phoneError").innerText = "";
        }

        if (valid) {
          showStep(2);
          document.getElementById("p2").classList.add("done");
          updateSummary();
        }
      }

      function nextStep2() {
        let valid = true;

        let address = document.getElementById("address");
        let city = document.getElementById("city");

        if (address.value.trim() == "") {
          valid = false;
          document.getElementById("addressError").innerText = "Enter address";
        } else {
          document.getElementById("addressError").innerText = "";
        }

        if (city.value.trim() == "") {
          valid = false;
          document.getElementById("cityError").innerText = "Enter city";
        } else {
          document.getElementById("cityError").innerText = "";
        }

        if (valid) {
          showStep(3);
          document.getElementById("p3").classList.add("done");
          updateSummary();
        }
      }

      function prevStep(step) {
        showStep(step);
      }

      function validateCard(number) {
        let sum = 0;
        let alternate = false;

        for (let i = number.length - 1; i >= 0; i--) {
          let n = parseInt(number.charAt(i));

          if (alternate) {
            n *= 2;

            if (n > 9) {
              n -= 9;
            }
          }

          sum += n;
          alternate = !alternate;
        }

        return sum % 10 == 0;
      }

      document
        .getElementById("checkoutForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          let valid = true;

          let card = document.getElementById("card").value;
          let expiry = document.getElementById("expiry").value;

          if (!validateCard(card)) {
            valid = false;
            document.getElementById("cardError").innerText =
              "Invalid card number";
          } else {
            document.getElementById("cardError").innerText = "";
          }

          let today = new Date();
          let expDate = new Date(expiry);

          if (expDate < today) {
            valid = false;
            document.getElementById("expiryError").innerText = "Card expired";
          } else {
            document.getElementById("expiryError").innerText = "";
          }

          if (valid) {
            alert("Order Placed Successfully!");
          }
        });
    </script>
  </body>
</html>
