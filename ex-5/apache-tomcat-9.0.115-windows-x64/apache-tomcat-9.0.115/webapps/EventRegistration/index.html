<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Event Registration</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        margin: 0;
        padding: 20px;
      }

      .container {
        max-width: 480px;
        margin: auto;
        background: #ffffff;
        padding: 30px 35px;
        border-radius: 15px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        animation: fadeIn 0.6s ease-in-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h2 {
        text-align: center;
        color: #333;
        margin-bottom: 25px;
      }

      label {
        font-weight: 600;
        margin-top: 12px;
        display: block;
        color: #555;
      }

      input[type="text"],
      input[type="email"],
      input[type="number"] {
        width: 100%;
        padding: 12px;
        margin-top: 6px;
        border-radius: 8px;
        border: 1px solid #ddd;
        font-size: 14px;
        transition: all 0.3s ease;
      }

      input:focus {
        border-color: #4facfe;
        box-shadow: 0 0 8px rgba(79, 172, 254, 0.4);
        outline: none;
      }

      .sessions {
        background: #f5f7fa;
        padding: 15px;
        border-radius: 10px;
        margin-top: 12px;
      }

      .sessions label {
        font-weight: normal;
        display: flex;
        align-items: center;
        margin-bottom: 10px;
        cursor: pointer;
        padding: 6px;
        border-radius: 6px;
        transition: 0.2s;
      }

      .sessions label:hover {
        background: #e9f2ff;
      }

      input[type="checkbox"] {
        margin-right: 10px;
        transform: scale(1.2);
      }

      .price {
        margin-left: auto;
        font-size: 13px;
        color: #888;
      }

      .btn {
        width: 100%;
        margin-top: 20px;
        padding: 14px;
        background: linear-gradient(135deg, #4facfe, #00c6ff);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      }

      .btn:active {
        transform: scale(0.98);
      }

      @media (max-width: 500px) {
        .container {
          padding: 20px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>🎟 Event Registration</h2>

      <form action="EventRegistrationServlet" method="post">
        <label>Name</label>
        <input type="text" name="name" required />

        <label>Email</label>
        <input type="email" name="email" required />

        <label>Age</label>
        <input type="number" name="age" required />

        <label>Select Sessions</label>
        <div class="sessions">
          <label>
            <input type="checkbox" name="session" value="Technical Workshop" />
            Technical Workshop
            <span class="price">₹500 | 18+</span>
          </label>

          <label>
            <input type="checkbox" name="session" value="Design Seminar" />
            Design Seminar
            <span class="price">₹400</span>
          </label>

          <label>
            <input type="checkbox" name="session" value="Marketing Talk" />
            Marketing Talk
            <span class="price">₹300</span>
          </label>
        </div>

        <button class="btn">Register Now</button>
      </form>
    </div>
  </body>
</html>
