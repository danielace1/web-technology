<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Event Registration</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #6a11cb, #2575fc);
        margin: 0;
        padding: 0;
      }

      .container {
        max-width: 450px;
        margin: 60px auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      }

      label {
        font-weight: bold;
        display: block;
        margin-top: 15px;
        color: #555;
      }

      input[type="text"],
      input[type="email"],
      input[type="number"] {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 8px;
        transition: 0.3s;
      }

      input:focus {
        border-color: #2575fc;
        outline: none;
        box-shadow: 0 0 5px rgba(37, 117, 252, 0.5);
      }

      .sessions {
        margin-top: 15px;
      }

      .session-item {
        background: #f7f9fc;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 8px;
        transition: 0.3s;
      }

      .session-item:hover {
        background: #eaf1ff;
      }

      input[type="checkbox"] {
        margin-right: 8px;
      }

      .submit-btn {
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        background: #2575fc;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
      }

      .submit-btn:hover {
        background: #1a5edb;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>🎟 Event Registration</h2>

      <form action="SessionEventRegistrationServlet" method="post">
        <label>Name</label>
        <input type="text" name="name" required />

        <label>Email</label>
        <input type="email" name="email" required />

        <label>Age</label>
        <input type="number" name="age" required />

        <h3>Select Sessions</h3>

        <div class="sessions">
          <div class="session-item">
            <input type="checkbox" name="session" value="Technical Workshop" />
            Technical Workshop (₹500, 18+)
          </div>

          <div class="session-item">
            <input type="checkbox" name="session" value="Design Seminar" />
            Design Seminar (₹400)
          </div>

          <div class="session-item">
            <input type="checkbox" name="session" value="Marketing Talk" />
            Marketing Talk (₹300)
          </div>
        </div>

        <input type="submit" value="Register Attendee" class="submit-btn" />
      </form>
    </div>
  </body>
</html>
